services:
  mop-agent:
    build:
      context: .
    image: mop-agent:latest
    restart: unless-stopped
    environment:
      APP_VERSION: ${APP_VERSION:-production}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-public-use}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-86400}
      SQLITE_DB_PATH: /app/data/runtime/mop.sqlite3
      DUCKDB_PATH: /app/data/runtime/mop.duckdb
      MAX_RETURN_ROWS: ${MAX_RETURN_ROWS:-250}
      QUERY_TIMEOUT_SECONDS: ${QUERY_TIMEOUT_SECONDS:-15}
      DEBUG_ERRORS: ${DEBUG_ERRORS:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1}
      ASSISTANT_ROUTER_MODE: ${ASSISTANT_ROUTER_MODE:-local}
      ASSISTANT_ROUTER_BASE_URL: ${ASSISTANT_ROUTER_BASE_URL:-https://api.deepseek.com}
      ASSISTANT_ROUTER_MODEL: ${ASSISTANT_ROUTER_MODEL:-deepseek-chat}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "127.0.0.1:${MOP_AGENT_PORT:-8000}:8000"
    volumes:
      - mop_agent_runtime:/app/data/runtime

volumes:
  mop_agent_runtime:
