- id: g19
  question: states with the highest financial literacy and their government debt ratio
  intent: ANALYTICAL
  tables: [finra_state, gov_state]
  must_columns: [state, financial_literacy, Debt_Ratio]
  note: cross-dataset join with state-casing trap
  reference_sql: >
    SELECT f.state AS label, f.financial_literacy AS v, g.Debt_Ratio
    FROM mart_finra_state f JOIN mart_gov_state g ON LOWER(f.state) = LOWER(g.state)
    WHERE f.Year = 2021 ORDER BY f.financial_literacy DESC LIMIT 10
  expect: { min_rows: 1, top_label: true }
  faithfulness: true

