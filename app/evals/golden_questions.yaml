# Golden suite for the LLM-grounded pipeline.
#
# intent taxonomy (Stage 1):
#   ANALYTICAL    answerable with SQL over the catalog
#   CLARIFY       answerable in principle but ambiguous -> must ask back
#   UNANSWERABLE  asks for data not in the catalog
#   META          about the assistant / the data / a definition (no SQL)
#   OUT_OF_SCOPE  not about this data at all
#
# For ANALYTICAL: `tables` is the routing gate (Stage 2); `reference_sql` is an
# independent hand-verified query (Stage 4 ground truth). `expect` modes:
#   row_count:N | min_rows:N | top_label:true | scalar:true(+rel_tol) |
#   answer_contains:[...]

# ---------------- ANALYTICAL ----------------
- id: g01
  question: top 10 counties in maryland by grants
  intent: ANALYTICAL
  tables: [contract_county]
  must_columns: [state, Grants]
  reference_sql: >
    SELECT county AS label, "Grants" AS v FROM mart_contract_county
    WHERE LOWER(state) = 'maryland' AND year = '2024'
    ORDER BY "Grants" DESC LIMIT 10
  expect: { row_count: 10, top_label: true }
  faithfulness: true

- id: g02
  question: top 5 states by poverty rate
  intent: ANALYTICAL
  tables: [acs_state]
  must_columns: ["Below poverty"]
  reference_sql: >
    SELECT state AS label, "Below poverty" AS v FROM mart_acs_state
    WHERE Year = 2023 ORDER BY "Below poverty" DESC LIMIT 5
  expect: { row_count: 5, top_label: true }
  faithfulness: true

