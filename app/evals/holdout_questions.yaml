# HELD-OUT generalization probe. These questions were authored AFTER the
# pipeline/prompts were finalized and are NEVER tuned against. They stress the
# grains and edges the golden set under-covers: county/congress grains, the
# now-inherited sibling-table docs, flow directionality, the 5-year aggregate
# period, ambiguous geography, paraphrase + distractor wording. Same schema as
# golden_questions.yaml.

# ---- demographics at non-state grain (% vs count signal must survive) ----
- id: h01
  question: which Maryland county has the largest asian population (people, not percent)
  intent: ANALYTICAL
  tables: [acs_county]
  must_columns: ["Total population", Asian]
  reference_sql: >
    SELECT county AS label, ("Total population" * "Asian" / 100.0) AS v
    FROM mart_acs_county WHERE LOWER(state) = 'maryland' AND Year = 2023
    ORDER BY v DESC LIMIT 1
  expect: { top_label: true }
  faithfulness: true

- id: h02
  question: top 5 congressional districts by share of residents with a graduate degree
  intent: ANALYTICAL
  tables: [acs_congress]
  must_columns: ["Education >= Graduate"]
  reference_sql: >
    SELECT cd_118 AS label, "Education >= Graduate" AS v FROM mart_acs_congress
    WHERE Year = 2023 ORDER BY "Education >= Graduate" DESC LIMIT 5
  expect: { row_count: 5, top_label: true }

# ---- government finance: county/congress, special-char col, no year ----
- id: h03
  question: which California county carries the most bonds, loans and notes
  intent: ANALYTICAL
  tables: [gov_county]
  must_columns: [state, "Bonds,_Loans_&_Notes"]
  note: special-character column must be double-quoted; gov has no year filter
  reference_sql: >
    SELECT county AS label, "Bonds,_Loans_&_Notes" AS v FROM mart_gov_county
    WHERE LOWER(state) = 'california' ORDER BY "Bonds,_Loans_&_Notes" DESC LIMIT 1
  expect: { top_label: true }

- id: h04
  question: top 10 congressional districts by net pension liability per capita
  intent: ANALYTICAL
  tables: [gov_congress]
  must_columns: [Net_Pension_Liability_per_capita]
  reference_sql: >
    SELECT cd_118 AS label, Net_Pension_Liability_per_capita AS v
    FROM mart_gov_congress ORDER BY Net_Pension_Liability_per_capita DESC LIMIT 10
  expect: { row_count: 10, top_label: true }

# ---- spending_state (now-inherited docs) ----
- id: h05
  question: how much did California get in direct payments
  intent: ANALYTICAL
  tables: [contract_state]
  must_columns: [state, "Direct Payments"]
  note: contract_state is the primary state awards table (same value as spending_state)
  reference_sql: >
    SELECT "Direct Payments" AS v FROM mart_contract_state
    WHERE LOWER(state) = 'california' AND year = '2024'
  expect: { scalar: true, rel_tol: 0.01 }

# ---- contract 5-year aggregate period (explicit '2020-2024') ----
- id: h06
  question: total grants to Texas over the 2020-2024 period
  intent: ANALYTICAL
  tables: [contract_state]
  must_columns: [state, Grants]
  note: must use the '2020-2024' aggregate row, not '2024'
  reference_sql: >
    SELECT "Grants" AS v FROM mart_contract_state
    WHERE LOWER(state) = 'texas' AND year = '2020-2024'
  expect: { scalar: true, rel_tol: 0.01 }

# ---- county_flow: FIPS-integer keys, directional ----
- id: h07
  question: total subaward dollars flowing out of Montgomery County, Maryland in 2023
  intent: ANALYTICAL
  tables: [county_flow]
  must_columns: [rcpt_cty_name, subaward_amount]
  reference_sql: >
    SELECT SUM(subaward_amount) AS v FROM mart_county_flow
    WHERE rcpt_cty_name LIKE 'Montgomery%' AND LOWER(rcpt_state) = 'maryland'
      AND act_dt_fis_yr = 2023
  expect: { scalar: true, rel_tol: 0.05 }

# ---- congress_flow: integer district id trap, use names ----
- id: h08
  question: which congressional district receives the most subaward inflow
  intent: ANALYTICAL
  tables: [congress_flow]
  must_columns: [subawardee_cd_name, subaward_amount]
  note: never join the integer stcd118 to cd_118; aggregate by name; latest year default
  reference_sql: >
    SELECT subawardee_cd_name AS label, SUM(subaward_amount) AS v
    FROM mart_congress_flow WHERE act_dt_fis_yr = 2024
    GROUP BY subawardee_cd_name ORDER BY v DESC LIMIT 1
  expect: { top_label: true }

# ---- finra at congress grain (2021 only) ----
- id: h09
  question: most financially literate congressional districts
  intent: ANALYTICAL
  tables: [finra_congress]
  must_columns: [financial_literacy]
  reference_sql: >
    SELECT cd_118 AS label, financial_literacy AS v FROM mart_finra_congress
    ORDER BY financial_literacy DESC LIMIT 10
