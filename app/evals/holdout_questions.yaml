# ---- agency alias + typo + measure synonym ----
- id: h12
  question: which states see the most NASA-adjacent... I mean Energy department grant money
  intent: ANALYTICAL
  tables: [spending_state_agency]
  must_columns: [agency, Grants]
  reference_sql: >
    SELECT state AS label, "Grants" AS v FROM mart_spending_state_agency
    WHERE agency = 'Department of Energy' AND year = '2024'
