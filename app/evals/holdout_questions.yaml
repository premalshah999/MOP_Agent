  expect: { top_label: true }
  faithfulness: true

# ---- cross-dataset county join via FIPS ----
- id: h13
  question: among Maryland counties, which has both high poverty and high government debt ratio
  intent: ANALYTICAL
  tables: [acs_county, gov_county]
  must_columns: [fips, "Below poverty", Debt_Ratio]
  note: county join key is fips; "both high" -> rank by poverty then debt ratio
  reference_sql: >
    SELECT a.county AS label, a."Below poverty" AS v, g.Debt_Ratio
    FROM mart_acs_county a JOIN mart_gov_county g ON a.fips = g.fips
    WHERE LOWER(a.state) = 'maryland' AND a.Year = 2023
    ORDER BY a."Below poverty" DESC, g.Debt_Ratio DESC LIMIT 5
  expect: { min_rows: 1, top_label: true }
  faithfulness: true

# ---- ambiguous geography -> default state ----
- id: h14
