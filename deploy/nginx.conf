# =============================================================================
# MOP Agent — Nginx site config
# =============================================================================
# This file is deployed automatically by deploy/setup.sh.
# For manual install:
#   1. Copy to /etc/nginx/sites-available/mop-agent
#   2. Replace YOUR_DOMAIN with your actual domain (or _ for IP-only)
#   3. Copy deploy/nginx-rate-limit.conf to /etc/nginx/conf.d/rate-limit.conf
#   4. ln -sf /etc/nginx/sites-available/mop-agent /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx
#   6. certbot --nginx -d YOUR_DOMAIN  (adds HTTPS automatically)
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Once certbot runs it replaces this with an HTTPS redirect.
    # Everything below is also duplicated inside the HTTPS block it creates.

    location /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_set_header   Host $host;
        access_log         off;
        proxy_read_timeout 10s;
    }

    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 30s;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass         http://127.0.0.1:8000;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
    }

    location / {
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 120s;
    }

    client_max_body_size 2m;
}
